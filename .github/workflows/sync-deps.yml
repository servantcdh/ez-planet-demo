name: Sync Library Dependencies

on:
  repository_dispatch:
    types: [library-published]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update labeling dependency
        working-directory: labeling
        run: npm install @servantcdh/ez-planet-labeling@latest --legacy-peer-deps

      - name: Update cosmos dependency
        working-directory: cosmos
        run: npm install @servantcdh/ez-planet-cosmos@latest --legacy-peer-deps

      - name: Read updated versions
        id: versions
        run: |
          LABELING_VER=$(node -p "require('./labeling/node_modules/@servantcdh/ez-planet-labeling/package.json').version" 2>/dev/null || echo "unchanged")
          COSMOS_VER=$(node -p "require('./cosmos/node_modules/@servantcdh/ez-planet-cosmos/package.json').version" 2>/dev/null || echo "unchanged")
          echo "labeling=$LABELING_VER" >> "$GITHUB_OUTPUT"
          echo "cosmos=$COSMOS_VER" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "[chore] sync library deps — labeling ${{ steps.versions.outputs.labeling }}, cosmos ${{ steps.versions.outputs.cosmos }}"
          git push
